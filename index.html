<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skyemane</title>
<link rel="icon" href="https://cdn.discordapp.com/avatars/1204381325172412466/a_e2c4a247a48f1aaf8ff86a2b4c7299ba.gif">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #12081c, #020003);
    color: #ede9fe;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    cursor: none;
}

/* ===== BACKGROUND ===== */
body::before, body::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 0;
}

body::before {
    background: radial-gradient(circle, rgba(124,58,237,0.2), transparent 60%);
    animation: move1 20s infinite alternate;
}

body::after {
    background: radial-gradient(circle, rgba(167,139,250,0.12), transparent 70%);
    animation: move2 30s infinite alternate;
}

@keyframes move1 {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(10%, 10%); }
}
@keyframes move2 {
    from { transform: translate(10%, -10%); }
    to { transform: translate(-10%, 10%); }
}

/* ===== PARTICLES ===== */
.particle {
    position: absolute;
    border-radius: 50%;
    background: #a78bfa;
    animation: float linear infinite;
    pointer-events: none; /* 🔥 FIX */
    z-index: 0;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* ===== CARD ===== */
.card {
    width: 330px;
    padding: 50px 30px;
    border-radius: 24px;
    text-align: center;
    position: relative;
    z-index: 10;

    background: rgba(25, 12, 45, 0.7);
    backdrop-filter: blur(30px);

    border: 1px solid rgba(167,139,250,0.25);
    box-shadow:
        0 0 120px rgba(124,58,237,0.35),
        inset 0 0 40px rgba(124,58,237,0.1);

    transform-style: preserve-3d;
}

/* glow follow */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none; /* 🔥 FIX */
    background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,0.2), transparent 60%);
    opacity: 0;
    transition: 0.3s;
}
.card:hover::after { opacity: 1; }

/* ===== IMAGE ===== */
img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #a78bfa;
    object-fit: cover;
    transition: 0.4s;
}
img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 60px rgba(167,139,250,1);
}

/* ===== TEXT ===== */
h1 {
    margin: 18px 0 6px;
    font-size: 30px;
    background: linear-gradient(90deg, #fff, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 25px rgba(167,139,250,0.6);
}

/* ===== BUTTON ===== */
.discord-btn {
    display: inline-block;
    padding: 14px 32px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: bold;
    color: #fff;
    cursor: pointer;

    position: relative;
    z-index: 1000; /* 🔥 FIX */

    background: linear-gradient(135deg, #7c3aed, #4c1d95);
    box-shadow: 0 0 30px rgba(124,58,237,0.6);
    transition: 0.25s;
}

.discord-btn:hover {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 0 80px rgba(124,58,237,1);
}

.discord-btn:active {
    transform: scale(0.95);
}

/* ===== CURSOR ===== */
.cursor-dot, .cursor-ring {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
}

.cursor-dot {
    width: 6px;
    height: 6px;
    background: #ddd6fe;
    border-radius: 50%;
}

.cursor-ring {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(167,139,250,0.6);
    border-radius: 50%;
    transition: 0.2s;
}

.cursor-hover {
    width: 70px !important;
    height: 70px !important;
}

/* ripple */
.click-wave {
    position: fixed;
    border: 2px solid #a78bfa;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    pointer-events: none; /* 🔥 FIX */
    transform: translate(-50%, -50%);
    animation: wave 0.6s ease-out;
}

@keyframes wave {
    to {
        transform: translate(-50%, -50%) scale(6);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<div class="card" id="card">
    <img src="https://cdn.discordapp.com/avatars/1204381325172412466/a_e2c4a247a48f1aaf8ff86a2b4c7299ba.gif">

    <h1>Skyemane</h1>
    <p id="typing"></p>

    <!-- ✅ WORKING BUTTON -->
    <a class="discord-btn"
       href="https://discord.com/invite/maneps"
       target="_blank"
       rel="noopener noreferrer">
       Join My Discord
    </a>

</div>

<script>
/* typing */
const text="Hey 👋 I'm Skyemane\nGamer • Coder • Vibing online";
let i=0;
(function type(){
    if(i<text.length){
        typing.innerHTML += text[i]==="\n"?"<br>":text[i];
        i++; setTimeout(type,20);
    }
})();

/* cursor */
const dot=document.querySelector(".cursor-dot");
const ring=document.querySelector(".cursor-ring");

let mx=0,my=0,rx=0,ry=0;

document.addEventListener("mousemove",e=>{
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+"px";
    dot.style.top=my+"px";
});

(function loop(){
    rx+=(mx-rx)*0.15;
    ry+=(my-ry)*0.15;
    ring.style.left=rx+"px";
    ring.style.top=ry+"px";
    requestAnimationFrame(loop);
})();

/* hover */
document.querySelectorAll("a,img").forEach(el=>{
    el.onmouseenter=()=>ring.classList.add("cursor-hover");
    el.onmouseleave=()=>ring.classList.remove("cursor-hover");
});

/* ripple */
document.addEventListener("click",e=>{
    let w=document.createElement("div");
    w.className="click-wave";
    w.style.left=e.clientX+"px";
    w.style.top=e.clientY+"px";
    document.body.appendChild(w);
    setTimeout(()=>w.remove(),600);
});

/* particles */
for(let i=0;i<80;i++){
    let p=document.createElement("div");
    p.className="particle";
    let size=Math.random()*3+1;
    p.style.width=size+"px";
    p.style.height=size+"px";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(6+Math.random()*10)+"s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
